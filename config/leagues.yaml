# SportsPulse — Sports & League Configuration
# ─────────────────────────────────────────────────────────────────
# This file controls which sports and leagues the ingestion
# pipeline fetches data for. No code changes needed to add a
# new league — just add an entry here and set active: true.
#
# active: true  → producer fetches this league on every run
# active: false → league is defined but not currently ingested
#
# free_tier: true  → accessible on API-Football free plan (100 req/day)
# free_tier: false → requires paid API-Football plan
#
# status: human-readable note on current availability
# ─────────────────────────────────────────────────────────────────

sports:

  football:
    leagues:

      # ── ACTIVE (free tier, historical) ────────────────────────
      - id: 1
        name: "World Cup"
        season: 2022
        active: true
        free_tier: true
        status: "historical — full tournament data, 64 matches, free tier"
        notes: "Primary training dataset for ML model. England 6-2 Iran
                replay confirmed working. All 64 matches available."

      # ── PLANNED (paid tier) ───────────────────────────────────
